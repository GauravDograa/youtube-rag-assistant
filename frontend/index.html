<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>YouTube RAG</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <h1>🎥 YouTube RAG Assistant</h1>

    <div class="card">

        <input
            id="videoUrl"
            type="text"
            placeholder="Paste YouTube URL">

        <button onclick="loadVideo()">

            Load Video

        </button>

    </div>

    <div class="card">

        <textarea
            id="question"
            placeholder="Ask a question..."></textarea>

        <button onclick="askQuestion()">

            Ask

        </button>

    </div>

    <div
        class="card"
        id="answer">

        Answer will appear here...

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
